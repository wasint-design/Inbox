<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MuvMi Chat - Inbox</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #f3f4f6; }
    .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body class="antialiased">

  <div class="mx-auto max-w-[430px] min-h-screen bg-white shadow-md flex flex-col">

    <!-- iOS Status Bar -->
    <div class="flex items-center justify-between px-4 pt-3 pb-1 shrink-0">
      <span class="text-[17px] font-semibold">9:41</span>
      <div class="w-20"></div>
      <div class="flex items-center gap-[5px]">
        <!-- Signal -->
        <svg width="17" height="12" viewBox="0 0 17 12" fill="black">
          <rect x="0" y="7" width="3" height="5" rx="1"/>
          <rect x="4.5" y="4.5" width="3" height="7.5" rx="1"/>
          <rect x="9" y="2" width="3" height="10" rx="1"/>
          <rect x="13.5" y="0" width="3" height="12" rx="1" opacity="0.3"/>
        </svg>
        <!-- Wifi -->
        <svg width="16" height="12" viewBox="0 0 16 12" fill="black">
          <path d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z"/>
          <path d="M3.5 6.3A6.5 6.5 0 0 1 12.5 6.3" stroke="black" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <path d="M1 3.7A10 10 0 0 1 15 3.7" stroke="black" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </svg>
        <!-- Battery -->
        <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
          <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="black" stroke-opacity="0.35"/>
          <rect x="2" y="2" width="16" height="8" rx="2" fill="black"/>
          <path d="M23 4v4a2 2 0 0 0 0-4z" fill="black" fill-opacity="0.4"/>
        </svg>
      </div>
    </div>

    <!-- Navigation Bar -->
    <div class="flex items-center justify-center relative h-14 border-b border-black/[0.08] shadow-[0px_1px_0px_rgba(0,0,0,0.08)] shrink-0">
      <button class="absolute left-4 flex items-center justify-center w-6 h-6">
        <svg width="11" height="18" viewBox="0 0 11 18" fill="none">
          <path d="M9.5 1L1.5 9L9.5 17" stroke="#0D57E2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <h1 class="text-[20px] font-semibold text-[#4F4F4F] leading-[30px]">Inbox</h1>
    </div>

    <!-- Tabs -->
    <div class="flex shrink-0 border-b border-[#E7EEFC]">
      <button onclick="setTab('message')" id="tab-message"
        class="flex-1 h-[46px] flex items-center justify-center text-[16px] font-semibold tracking-[0.25px] transition-colors text-[#0D57E2] border-b-2 border-[#0D57E2]">
        Message
      </button>
      <button onclick="window.location.href='support.html'" id="tab-support"
        class="flex-1 h-[46px] flex items-center justify-center text-[16px] font-semibold tracking-[0.25px] transition-colors text-[#4F4F4F]">
        Support
      </button>
    </div>

    <!-- Filter Chips -->
    <div class="flex gap-2 px-4 py-3 border-b border-[#E7EEFC] shrink-0">
      <button onclick="setFilter('all')" id="chip-all"
        class="px-4 py-1 rounded-full text-[14px] font-semibold tracking-[0.25px] border transition-colors bg-[#E7EEFC] border-[#0D57E2] text-[#0D57E2]">
        All
      </button>
      <button onclick="setFilter('marketing')" id="chip-marketing"
        class="px-4 py-1 rounded-full text-[14px] font-semibold tracking-[0.25px] border transition-colors border-[#909090] text-[#909090]">
        Marketing
      </button>
      <button onclick="setFilter('system')" id="chip-system"
        class="px-4 py-1 rounded-full text-[14px] font-semibold tracking-[0.25px] border transition-colors border-[#909090] text-[#909090]">
        System
      </button>
    </div>

    <!-- Message List -->
    <div class="flex-1 overflow-y-auto" id="message-list"></div>

  </div>

  <script>
    const messages = [
      { id: 1, time: "Today, 10:45",      title: "Your order has been processed",    preview: "You will receive a confirmation email shortly.",                                    unread: true,  category: "system"    },
      { id: 2, time: "Today, 10:37",      title: "รับเลย เงินคืน 15%",              preview: "กดใช้โค้ด NY15 รับ cashback 15% เมื่อเดินทางในช่วง Happy hor เท่านั้น",          unread: true,  category: "marketing" },
      { id: 3, time: "Today, 11:00",      title: "Scheduled maintenance notice",     preview: "Our services will be temporarily unavailable from 2 PM to 3 PM.",                unread: true,  category: "system"    },
      { id: 4, time: "Tomorrow, 14:22",   title: "รับเลย ส่วนลด 20%",              preview: "ใช้โค้ด SAVE20 รับส่วนลด 20% สำหรับการจองที่พัก",                                 unread: false, category: "marketing" },
      { id: 5, time: "Saturday, 09:15",   title: "พิเศษ! เงินคืน 10%",             preview: "ใช้โค้ด WEEKEND10 รับเงินคืน 10% เมื่อช้อปปิ้งในวันเสาร์",                       unread: true,  category: "marketing" },
      { id: 6, time: "Today, 10:52",      title: "Our support team is here to help", preview: "Feel free to reach out with any questions.",                                      unread: true,  category: "system"    },
      { id: 7, time: "Next Monday, 16:50",title: "โปรเด็ด! ลด 25%",               preview: "ใช้โค้ด FLASH25 ลด 25% สำหรับสินค้าทุกชิ้นในร้าน",                               unread: true,  category: "marketing" },
      { id: 8, time: "Today, 10:37",      title: "We apologize for the delay service", preview: "We apologize for the delay due to a high volume of customers.",                 unread: false, category: "system"    },
    ];

    let activeTab = "message";
    let activeFilter = "all";

    function setTab(tab) {
      activeTab = tab;
      ["message", "support"].forEach(t => {
        const el = document.getElementById("tab-" + t);
        if (t === tab) {
          el.className = "flex-1 h-[46px] flex items-center justify-center text-[16px] font-semibold tracking-[0.25px] transition-colors text-[#0D57E2] border-b-2 border-[#0D57E2]";
        } else {
          el.className = "flex-1 h-[46px] flex items-center justify-center text-[16px] font-semibold tracking-[0.25px] transition-colors text-[#4F4F4F]";
        }
      });
      renderMessages();
    }

    function setFilter(filter) {
      activeFilter = filter;
      ["all", "marketing", "system"].forEach(f => {
        const el = document.getElementById("chip-" + f);
        if (f === filter) {
          el.className = "px-4 py-1 rounded-full text-[14px] font-semibold tracking-[0.25px] border transition-colors bg-[#E7EEFC] border-[#0D57E2] text-[#0D57E2]";
        } else {
          el.className = "px-4 py-1 rounded-full text-[14px] font-semibold tracking-[0.25px] border transition-colors border-[#909090] text-[#909090]";
        }
      });
      renderMessages();
    }

    function renderMessages() {
      const list = document.getElementById("message-list");
      const filtered = activeFilter === "all"
        ? messages
        : messages.filter(m => m.category === activeFilter);

      list.innerHTML = filtered.map(msg => `
        <div class="relative flex flex-col gap-1 px-4 py-4 border-b border-[#EEEEEE] active:bg-gray-50 cursor-pointer">
          <span class="text-[12px] font-medium text-[#909090] tracking-[0.25px] truncate">${msg.time}</span>
          <span class="text-[16px] font-semibold text-[#4F4F4F] tracking-[0.25px] leading-6">${msg.title}</span>
          <span class="text-[14px] font-medium text-[#909090] tracking-[0.25px] leading-[22px] truncate">${msg.preview}</span>
          ${msg.unread ? '<span class="absolute top-4 right-4 w-3 h-3 rounded-full bg-[#0D57E2]"></span>' : ""}
        </div>
      `).join("");
    }

    renderMessages();
  </script>
</body>
</html>
